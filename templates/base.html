<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Capella Fabric Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { background-color: #f5f7fa; }
    .navbar-brand { letter-spacing: .03em; }
    .step-badge {
      display: inline-block;
      width: 1.7rem; height: 1.7rem;
      line-height: 1.7rem;
      text-align: center;
      border-radius: 50%;
      background: #0d6efd;
      color: #fff;
      font-weight: 700;
      font-size: .85rem;
      margin-right: .4rem;
    }
    pre.yaml-preview {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: .5rem;
      padding: 1rem;
      font-size: .78rem;
      max-height: 280px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
  <div class="container-lg d-flex align-items-center">
    <a class="navbar-brand fw-semibold me-auto" href="/">Capella Fabric Generator</a>
    <a class="nav-link text-secondary small me-3" href="{{ url_for('help_page') }}">Help</a>
    <span class="text-secondary small">Capella 7.0.1</span>
  </div>
</nav>

<div class="container-lg" style="max-width: 860px;">

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmPYNm8bY5GBdYFYIBdCMSOikHP"
        crossorigin="anonymous"></script>
</body>
</html>
